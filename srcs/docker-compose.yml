version: '3'

networks: 
  mynet: 
    driver: bridge



volumes:
  mariadb:
    driver: local
    driver_opts: 
      type: none
      o: bind
      device: /home/sgalli/data/mariadb_data

  wordpress:
    driver: local
    driver_opts: 
      type: none
      o: bind
      device: /home/sgalli/data/wordpress_data


services:
  mariadb: 
    build: ./srcs/requirements/mariadb
    container_name: mariadb
    restart: always
    image: mariadb
    volumes:
      - mariadb:/var/lib/mysql
    env_file: 
      - .env
    networks:
      - mynet

  wordpress:
    build: ./srcs/requirements/wordpress
    container_name: wordpress
    image: wordpress
    restart: always
    volumes: 
      - wordpress:/var/www
    env_file: 
      - .env
    networks: 
      - mynet
    depends_on: 
      - mariadb

  nginx:
    build: ./srcs/requirements/nginx
    container_name: nginx
    image: nginx
    ports: 
      - 443:443
    restart: always
    volumes: 
      - wordpress:/var/www
    env_file: 
      - .env
    networks: 
      - mynet
    depends_on: 
      - wordpress